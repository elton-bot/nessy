<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <rect width="1200" height="1200" fill="#F6F4EF"/>
  <!-- design lives in the centered 1200x630 band (y 285..915) -->
  <g transform="translate(0,285)">
    <rect x="0" y="0" width="1200" height="12" fill="#2F7E76"/>
    <g transform="translate(90,70)">
      <rect width="76" height="76" rx="20" fill="#2F7E76"/>
      <text x="38" y="54" font-family="-apple-system, Inter, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff" text-anchor="middle">N</text>
      <text x="98" y="52" font-family="-apple-system, Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#1F2421">Nessy</text>
    </g>
    <text x="90" y="248" font-family="-apple-system, Inter, Arial, sans-serif" font-size="68" font-weight="800" fill="#1F2421">Your household, organized.</text>
    <text x="90" y="326" font-family="-apple-system, Inter, Arial, sans-serif" font-size="68" font-weight="800" fill="#2F7E76">Even your staff.</text>
    <text x="92" y="392" font-family="-apple-system, Inter, Arial, sans-serif" font-size="29" font-weight="500" fill="#5B635E">The home operating system — from a studio to a full estate.</text>
    <g font-family="-apple-system, Inter, Arial, sans-serif" font-size="23" font-weight="700">
      <rect x="90" y="448" width="224" height="56" rx="28" fill="#E4F0EE"/>
      <text x="202" y="484" fill="#245E58" text-anchor="middle">Inventory · Tasks</text>
      <rect x="330" y="448" width="236" height="56" rx="28" fill="#E4F0EE"/>
      <text x="448" y="484" fill="#245E58" text-anchor="middle">Groceries · Bills</text>
      <rect x="582" y="448" width="306" height="56" rx="28" fill="#FAF1DF"/>
      <text x="735" y="484" fill="#9a6a12" text-anchor="middle">Staff · Attendance · Pay</text>
    </g>
    <text x="1110" y="572" font-family="-apple-system, Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#9AA09B" text-anchor="end">Founding-member early access</text>
  </g>
</svg>
